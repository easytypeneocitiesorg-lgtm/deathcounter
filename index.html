<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Global Death Estimates</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  text-align: center;
  padding: 40px;
  overflow-x: hidden;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  max-width: 900px;
  margin: auto;
}

.card {
  background: #1e1e1e;
  padding: 25px;
  border-radius: 12px;
  transition: transform 3s ease;
}

.number {
  font-size: 2em;
  margin-top: 10px;
  color: #ff4c4c;
}

.zoom-focus {
  transform: scale(1.8);
}
</style>
</head>
<body>

<h1>Live Global Death Estimates (This Year)</h1>

<div class="container">
  <div class="card">
    <h2>Alcohol</h2>
    <div class="number" id="alcohol">0</div>
  </div>
  <div class="card">
    <h2>Smoking</h2>
    <div class="number" id="smoking">0</div>
  </div>
  <div class="card">
    <h2>Drug Overdoses</h2>
    <div class="number" id="drugs">0</div>
  </div>
  <div class="card" id="suicideCard">
    <h2>Suicide</h2>
    <div class="number" id="suicide">0</div>
  </div>
</div>

<script>
const alcoholPerYear = 3000000;
const smokingPerYear = 8000000;
const drugPerYear = 600000;
const suicidePerYear = 800000;

const secondsInYear = 31536000;
const startOfYear = new Date(new Date().getFullYear(), 0, 1).getTime();

let suicideOffset = 0;
let eventActive = false;

function updateCounts() {
  const now = Date.now();
  const secondsElapsed = (now - startOfYear) / 1000;

  function calculate(perYear) {
    return Math.floor((perYear / secondsInYear) * secondsElapsed);
  }

  document.getElementById("alcohol").innerText =
    calculate(alcoholPerYear).toLocaleString();

  document.getElementById("smoking").innerText =
    calculate(smokingPerYear).toLocaleString();

  document.getElementById("drugs").innerText =
    calculate(drugPerYear).toLocaleString();

  const suicideValue = calculate(suicidePerYear) + suicideOffset;
  document.getElementById("suicide").innerText =
    suicideValue.toLocaleString();
}

updateCounts();
setInterval(updateCounts, 1000);

function triggerRareEvent() {
  if (eventActive) return;
  eventActive = true;

  const suicideCard = document.getElementById("suicideCard");
  suicideCard.classList.add("zoom-focus");

  setTimeout(() => {
    suicideOffset -= 1;
    updateCounts();
  }, 2500);

  setTimeout(() => {
    suicideCard.classList.remove("zoom-focus");
    eventActive = false;
  }, 5000);
}

// Random trigger (1% every 10s)
setInterval(() => {
  if (Math.random() < 0.01) {
    triggerRareEvent();
  }
}, 10000);

// WASD simultaneous trigger
const keysPressed = {};

document.addEventListener("keydown", (e) => {
  keysPressed[e.key.toLowerCase()] = true;

  if (
    keysPressed["w"] &&
    keysPressed["a"] &&
    keysPressed["s"] &&
    keysPressed["d"]
  ) {
    triggerRareEvent();
  }
});

document.addEventListener("keyup", (e) => {
  keysPressed[e.key.toLowerCase()] = false;
});
</script>

</body>
</html>
