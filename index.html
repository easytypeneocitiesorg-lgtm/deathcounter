<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Global Death Statistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      text-align: center;
      margin: 0;
      padding: 40px;
    }
    h1 {
      margin-bottom: 30px;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }
    .card {
      background: #1e1e1e;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
    }
    .number {
      font-size: 2em;
      margin-top: 10px;
      color: #ff4c4c;
    }
    footer {
      margin-top: 40px;
      font-size: 0.8em;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>Live Global Death Estimates</h1>

  <div class="container">
    <div class="card">
      <h2>Alcohol Deaths</h2>
      <div class="number" id="alcohol">Loading...</div>
    </div>
    <div class="card">
      <h2>Smoking Deaths</h2>
      <div class="number" id="smoking">Loading...</div>
    </div>
    <div class="card">
      <h2>Drug Overdose Deaths</h2>
      <div class="number" id="drugs">Loading...</div>
    </div>
    <div class="card">
      <h2>Suicide Deaths</h2>
      <div class="number" id="suicide">Loading...</div>
    </div>
  </div>

  <footer>
    Data source: Worldometer (estimated live counters)
  </footer>

  <script>
    async function fetchData() {
      try {
        const response = await fetch("https://disease.sh/v3/worldometer/all");
        const data = await response.json();

        // These values are estimated annual totals
        const alcoholPerYear = 3000000; 
        const smokingPerYear = 8000000;
        const drugPerYear = 600000;
        const suicidePerYear = 800000;

        const secondsInYear = 31536000;
        const now = Date.now() / 1000;

        function liveEstimate(perYear) {
          return Math.floor((perYear / secondsInYear) * now);
        }

        document.getElementById("alcohol").innerText = 
          liveEstimate(alcoholPerYear).toLocaleString();
        document.getElementById("smoking").innerText = 
          liveEstimate(smokingPerYear).toLocaleString();
        document.getElementById("drugs").innerText = 
          liveEstimate(drugPerYear).toLocaleString();
        document.getElementById("suicide").innerText = 
          liveEstimate(suicidePerYear).toLocaleString();

        setInterval(() => {
          document.getElementById("alcohol").innerText = 
            liveEstimate(alcoholPerYear).toLocaleString();
          document.getElementById("smoking").innerText = 
            liveEstimate(smokingPerYear).toLocaleString();
          document.getElementById("drugs").innerText = 
            liveEstimate(drugPerYear).toLocaleString();
          document.getElementById("suicide").innerText = 
            liveEstimate(suicidePerYear).toLocaleString();
        }, 1000);

      } catch (err) {
        document.body.innerHTML = "<h2>Error loading data.</h2>";
      }
    }

    fetchData();
  </script>

</body>
</html>
